        .item-card1{

        .item-card2{

        }
        .arrow{
            display: none;
        }
        .item-card1:hover .arrow{
            display: block;
        }
         .item-card2:hover .arrow{
            display: block;
        }

        #title-ani{
            animation: title-appear 1.5s forwards;
        }
        #card1-ani{
            animation: card1-appear .8s forwards;
            animation-delay: .2s;
            opacity: 0;
        }
        #card2-ani{
            animation: card2-appear .8s forwards;
            animation-delay: .5s;
            opacity: 0;
        }
        /* title animation*/
        @keyframes title-appear{
            from{
                opacity: .2;
            }
            to{
                opacity: 1;
            }
        }
         /* card1 animation*/
        @keyframes card1-appear{
            from{
                transform: scale(.5);
                opacity: .2;
            }
            to{
                transform: scale(1);
                opacity: 1;
            }
        }
         /* card2 animation*/
        @keyframes card2-appear{
            from{
               transform: scale(.5);
                opacity: .2;
            }
            to{
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
